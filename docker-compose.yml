services:
  my_movie_be: #khai báo tên của image sẽ được tạo
    build: .
    container_name: movie_be #khai báo tên của container sẽ được tạo
    ports:
      - "8081:8080"
    env_file: #sử dụng environment nếu muốn truyền trực tiếp biến từ git vào
      - .env
    networks:
      - movie_network
# khai báo ở cấp độ root, cấp độ dùng chung
networks:
  movie_network:
    external:
      name: website-wpress_default

volumes:
  db_data:
